{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto my-10 bg-[#1a232a] p-8 rounded-lg shadow-xl border border-gray-800 text-white">
    <div class="flex flex-col md:flex-row gap-8 items-center md:items-start">
        <div class="w-48 h-64 flex-shrink-0 bg-gray-800 rounded-lg overflow-hidden border border-gray-700">
            {% if actor.photo_url %}
                <img src="{{ actor.photo_url }}" alt="{{ actor.name }}" class="w-full h-full object-cover">
            {% else %}
                <div class="w-full h-full flex items-center justify-center text-gray-500 text-sm">No Photo</div>
            {% endif %}
        </div>
        <div class="flex-1 text-center md:text-left space-y-4">
            <h1 class="text-4xl font-bold text-white">{{ actor.name }}</h1>
            <p class="text-xl text-gray-400">Age: <span class="text-white">{{ actor.age|default:"Unknown" }}</span></p>

            <div class="flex flex-wrap gap-4 pt-4 justify-center md:justify-start">
                <a href="{% url 'actor_update' actor.pk %}" class="bg-blue-600 text-white px-5 py-2 rounded font-semibold hover:bg-blue-700 transition">
                    Edit Details
                </a>
                <a href="{% url 'actor_delete' actor.pk %}" class="bg-red-600 text-white px-5 py-2 rounded font-semibold hover:bg-red-700 transition">
                    Delete Actor
                </a>
            </div>
        </div>
    </div>
    <hr class="border-gray-800 my-6">
    <a href="{% url 'actor_list' %}" class="text-[#00e054] hover:underline text-sm">← Back to Actors List</a>
</div>
{% endblock %}

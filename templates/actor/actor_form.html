{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto my-10 bg-[#1a232a] p-8 rounded-lg shadow-xl border border-gray-800">
    <h2 class="text-2xl font-bold text-white mb-6 text-center">{{ title }}</h2>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-gray-400 text-sm font-semibold mb-2">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}

        <div class="flex gap-4 pt-2">
            <button type="submit" class="flex-1 bg-[#00e054] text-black font-bold p-3 rounded hover:bg-[#00b343] transition">
                Save Actor
            </button>
            <a href="{% url 'actor_list' %}" class="flex-1 bg-gray-700 text-white font-bold p-3 rounded text-center hover:bg-gray-600 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
